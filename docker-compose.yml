services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: car_dealership
      MYSQL_USER: car_user
      MYSQL_PASSWORD: car_pass
      MYSQL_ROOT_PASSWORD: root
    ports: ["3306:3306"]
    volumes:
      - ./backend/database/migrations:/docker-entrypoint-initdb.d/migrations
      - ./backend/database/seeders:/docker-entrypoint-initdb.d/seeders

  backend:
    build: ./backend
    env_file: ./backend/.env.example
    volumes:
      - ./backend:/var/www/html
    depends_on: [mysql]

  frontend:
    build: ./frontend
    depends_on: [backend]

  nginx:
    image: nginx:alpine
    ports: ["8080:80"]
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on: [frontend, backend]

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    environment:
      PMA_HOST: mysql
    ports: ["8081:80"]
    depends_on: [mysql]
